<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>acacia-studio — レポート一覧</title>
  <link rel="stylesheet" href="/output.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <script>
  (function(){try{const ls=localStorage.getItem('mdweb-theme');const sys=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';const theme=ls||sys;document.documentElement.dataset.theme=theme;document.documentElement.classList.toggle('dark',theme==='dark');}catch(_){}})();
  </script>
</head>
<body class="site-shell">
  <header class="site-header">
    <div class="site-header-inner">
      <div class="navbar-start gap-1">
        <a class="btn btn-ghost btn-sm font-serif text-base lg:hidden" href="../index.html">← 戻る</a>
        <a class="site-brand hidden lg:flex" href="../index.html"><svg width="28" height="28" viewBox="0 0 34 34" fill="none" aria-hidden="true"><rect width="34" height="34" rx="8" fill="currentColor" opacity=".1"/><path d="M8.5 7h11L26 13.5V27H8.5z" fill="currentColor" opacity=".85"/><path d="M19.5 7l6.5 6.5h-6.5z" fill="currentColor" opacity=".35"/><rect x="12" y="16" width="8.5" height="1.5" rx=".75" fill="#3b82f6"/><rect x="12" y="19.5" width="8.5" height="1.5" rx=".75" fill="currentColor" opacity=".35"/><rect x="12" y="23" width="5.5" height="1.5" rx=".75" fill="currentColor" opacity=".35"/></svg>MarkDown-Web</a>
      </div>
      <nav class="site-nav"><ul><li><a class="site-nav-link" href="/">Home</a></li><li><a class="site-nav-link is-active" href="/index.html">クライアント一覧</a></li></ul></nav>
      <div class="navbar-end gap-1">
        <label class="site-iconbtn swap swap-rotate" aria-label="テーマ切替"><input id="theme-controller" type="checkbox" class="theme-controller" value="dark"><svg class="swap-on h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v1"/><path d="M12 20v1"/><path d="M4.22 4.22l.7.7"/><path d="M19.08 19.08l.7.7"/><path d="M1 12h1"/><path d="M22 12h1"/><path d="M4.92 19.08l-.7.7"/><path d="M19.78 4.22l-.7.7"/><circle cx="12" cy="12" r="4"/></svg><svg class="swap-off h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 7.5A9 9 0 1 1 12 3Z"/></svg></label>
        <span class="hidden md:inline-flex items-center rounded-full border border-base-300 bg-base-200/60 px-2.5 py-0.5 text-[0.62rem] font-bold uppercase tracking-[0.18em] text-base-content/60">Confidential</span>
      </div>
    </div>
  </header>

  <main class="flex-1">
    <section class="site-container pt-8 pb-4">
      <a class="link link-hover text-sm text-base-content/60" href="../index.html">← code</a>
      <div class="eyebrow mt-4 mb-2">Client Report</div>
      <h1 class="text-3xl lg:text-4xl font-serif font-bold text-base-content">acacia-studio</h1>
      <p class="mt-2 text-sm text-base-content/60" id="count"></p>
    </section>

    <section class="site-container pb-12">
      <div class="filter-bar">
        <div class="filter-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="search" placeholder="タイトル・説明で検索...">
        </div>
        <select id="sort" class="filter-select">
          <option value="date-desc" selected>日付: 新しい順</option>
          <option value="date-asc">日付: 古い順</option>
          <option value="title-asc">タイトル: A→Z</option>
          <option value="default">並び順: デフォルト</option>
        </select>
        <div class="filter-tags" id="tag-filters"></div>
      </div>
      <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3" id="grid"></div>
      <p class="hidden py-12 text-center text-sm text-base-content/50" id="no-results">該当するレポートが見つかりません</p>
    </section>
  </main>

  <footer class="site-footer"><div class="site-footer-inner"><span class="text-xs uppercase tracking-[0.18em] text-base-content/50">Confidential - Do not distribute</span><span class="text-xs text-base-content/40">Generated by report-converter</span></div></footer>

  <script>
    (function(){const c=document.getElementById('theme-controller');function a(t){document.documentElement.dataset.theme=t;document.documentElement.classList.toggle('dark',t==='dark');if(c)c.checked=t==='dark'}try{a(document.documentElement.dataset.theme||'light');if(c)c.addEventListener('change',()=>{const t=c.checked?'dark':'light';localStorage.setItem('mdweb-theme',t);a(t)})}catch(_){}})();
    const files=[{"file": "NAMING.html", "title": "コンテンツのファイル名規則 — effect.moe", "description": "src/content/配下のMD/MDXファイルの命名規則と、Hermes Agentおよび人間が従うべきslug生成のルールを定義したドキュメントです。", "tags": ["naming", "convention", "file", "naming", "slug", "web", "agent", "automation", "markdown", "astro", "content", "management", "effect.moe", "documentation"], "date": "", "created": "", "updated": "2026-06-08", "category": "guide", "domain": "", "src_path": "/Users/tonychu-mbp/LLM Wiki/wiki/EFFECT/assets/code/acacia-studio/NAMING.md"}, {"file": "README.html", "title": "Acacia Studio - Creative Digital Design Studio", "description": "AstroとTailwind CSSで構築された、滑らかなアニメーションとコンテンツ駆動型アーキテクチャを備えたプレミアムデジタルデザインスタジオのウェブサイト。", "tags": ["Astro", "Tailwind", "CSS", "GSAP", "Vercel", "Design", "System", "MDX", "Resend", "pnpm", "SEO", "Responsive", "Design"], "date": "", "created": "", "updated": "2026-06-08", "category": "guide", "domain": "astro.build", "src_path": "/Users/tonychu-mbp/LLM Wiki/wiki/EFFECT/assets/code/acacia-studio/README.md"}];
    const grid=document.getElementById('grid');
    const searchEl=document.getElementById('search');
    const sortEl=document.getElementById('sort');
    const tagFilters=document.getElementById('tag-filters');
    const noResults=document.getElementById('no-results');
    let activeTag='';

    const allTags=[...new Set(files.flatMap(f=>f.tags||[]))];
    const TAG_MAX=6;
    if(allTags.length){
      const all=document.createElement('button');
      all.className='tag-pill is-active tag-btn';all.textContent='すべて';
      all.onclick=()=>{activeTag='';setActive(all);render()};
      tagFilters.appendChild(all);
      allTags.forEach((t,i)=>{
        const b=document.createElement('button');b.className='tag-pill tag-btn';b.textContent=t;
        if(i>=TAG_MAX){b.dataset.overflow='1';b.style.display='none';}
        b.onclick=()=>{activeTag=t;setActive(b);render()};
        tagFilters.appendChild(b);
      });
      if(allTags.length>TAG_MAX){
        const tb=document.createElement('button');tb.id='tag-toggle';tb.className='btn btn-xs btn-ghost';
        tb.textContent='▼ +'+(allTags.length-TAG_MAX)+' タグ';
        tb.onclick=toggleTags;
        tagFilters.appendChild(tb);
      }
    }
    function toggleTags(){
      const tb=document.getElementById('tag-toggle');if(!tb)return;
      const isOpen=tb.dataset.open==='1';
      document.querySelectorAll('[data-overflow]').forEach(b=>b.style.display=isOpen?'none':'');
      tb.textContent=isOpen?'▼ +'+(allTags.length-TAG_MAX)+' タグ':'▲ 折りたたむ';
      tb.dataset.open=isOpen?'0':'1';
    }
    function setActive(el){document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('is-active'));el.classList.add('is-active')}

    function makeCard(f){
      const a=document.createElement('a');a.className='news-card group';a.href=f.file;
      const tags=(f.tags||[]).slice(0,4).map(t=>'<span class="tag-pill">'+t+'</span>').join('');
      const parts=[];
      if(f.category) parts.push('<span>'+f.category+'</span>');
      if(f.created) parts.push('<span class="divider-dot">作成 '+String(f.created).slice(0,10)+'</span>');
      if(f.updated && f.updated!==f.created) parts.push('<span class="divider-dot">更新 '+String(f.updated).slice(0,10)+'</span>');
      a.innerHTML='<div class="news-card-thumb"><span class="text-3xl text-base-content/30 transition-colors group-hover:text-secondary">📄</span></div>'+ 
        '<div class="flex flex-1 flex-col gap-1.5"><h3 class="news-card-title">'+f.title+'</h3>'+ 
        (f.description?'<p class="news-card-desc">'+f.description+'</p>':'')+ 
        (tags?'<div class="mt-1 flex flex-wrap gap-1">'+tags+'</div>':'')+ 
        '<div class="news-card-meta">'+parts.join('')+'</div>'+ 
        (f.domain?'<div class="mt-1 inline-flex items-center gap-1 text-xs text-secondary"><span>🌐</span>'+f.domain+'</div>':'')+'</div>';
      if(f.src_path){
        const shortPath=f.src_path.replace(/^\/Users\/[^/]+\//,'~/');
        const sp=document.createElement('div');sp.className='mt-1 cursor-pointer break-all font-mono text-[0.65rem] text-base-content/40 transition-colors hover:text-secondary';sp.title='クリックしてパスをコピー';sp.textContent='📄 '+shortPath;
        sp.onclick=e=>{e.stopPropagation();e.preventDefault();navigator.clipboard.writeText(f.src_path).then(()=>{sp.textContent='✅ コピーしました';setTimeout(()=>{sp.textContent='📄 '+shortPath;},1500);});};
        a.appendChild(sp);
        if('showOpenFilePicker' in window){const eb=document.createElement('button');eb.className='edit-btn btn btn-xs btn-primary absolute right-3 top-3 z-[5] opacity-0 transition-opacity group-hover:opacity-100';eb.textContent='編集';eb.onclick=e=>{e.stopPropagation();e.preventDefault();editMd(f.src_path,f.title||f.file);};a.appendChild(eb);}
      }
      return a;
    }

    function render(){
      const q=searchEl.value.toLowerCase();
      const sort=sortEl.value;
      let list=[...files];
      if(activeTag) list=list.filter(f=>(f.tags||[]).includes(activeTag));
      if(q) list=list.filter(f=>(f.title+' '+(f.description||'')).toLowerCase().includes(q));
      const eff=f=>[f.date||'',f.updated||''].sort().pop()||'';
      if(sort==='date-desc') list.sort((a,b)=>eff(b).localeCompare(eff(a)));
      else if(sort==='date-asc') list.sort((a,b)=>eff(a).localeCompare(eff(b)));
      else if(sort==='title-asc') list.sort((a,b)=>a.title.localeCompare(b.title,'ja'));
      grid.innerHTML='';
      list.forEach(f=>grid.appendChild(makeCard(f)));
      const c=list.length;
      document.getElementById('count').textContent=files.length+' 件のレポート'+(c<files.length?' （'+c+' 件表示中）':'');
      noResults.style.display=c===0?'block':'none';
    }

    searchEl.addEventListener('input',render);
    sortEl.addEventListener('change',render);
    render();
    if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
    function showToast(m,d=3000){let t=document.getElementById('md-toast');if(!t){t=document.createElement('div');t.id='md-toast';t.className='alert fixed bottom-6 right-6 z-[300] max-w-sm shadow-lg';document.body.appendChild(t);}t.textContent=m;t.style.display='flex';setTimeout(()=>t.style.display='none',d);}
    async function _openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('mdweb-fh',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('fh');r.onsuccess=e=>res(e.target.result);r.onerror=rej;});}
    async function _getFH(key){try{const db=await _openDB();return await new Promise((res,rej)=>{const r=db.transaction('fh').objectStore('fh').get(key);r.onsuccess=()=>res(r.result);r.onerror=rej;});}catch(e){return null;}}
    async function _putFH(key,fh){try{const db=await _openDB();await new Promise((res,rej)=>{const tx=db.transaction('fh','readwrite');const r=tx.objectStore('fh').put(fh,key);r.onsuccess=res;r.onerror=rej;});}catch(e){}}
    async function editMd(src,title){
      const apiToken=localStorage.getItem('mdweb-api-token');
      if(apiToken){
        try{const resp=await fetch(_API_URL+'/api/file?path='+encodeURIComponent(src),{headers:{'Authorization':'Bearer '+apiToken}});if(!resp.ok)throw new Error('API '+resp.status);const data=await resp.json();document.getElementById('ed-title').textContent=title;document.getElementById('ed-area').value=data.content;document.getElementById('ed-overlay').style.display='flex';document.getElementById('ed-save').onclick=async()=>{const sr=await fetch(_API_URL+'/api/file',{method:'PUT',headers:{'Authorization':'Bearer '+apiToken,'Content-Type':'application/json'},body:JSON.stringify({path:src,content:document.getElementById('ed-area').value})});if(sr.ok){document.getElementById('ed-overlay').style.display='none';showToast('✅ 保存しました — 変換が開始されます',4000);if(Notification.permission==='granted')new Notification('MD-Web: 保存完了',{body:'自動変換・デプロイが開始されます',icon:'/icon-192.png'});}else showToast('⚠️ 保存に失敗しました ('+sr.status+')');};return;}catch(e){showToast('⚠️ API接続失敗 — API設定を確認してください');return;}
      }
      if(!('showOpenFilePicker' in window)){showToast('⚠️ ⚙️ からAPIを設定するとスマートフォンでも編集できます');return;}
      try{let fh=await _getFH(src);if(fh){const perm=await fh.requestPermission({mode:'readwrite'});if(perm!=='granted')fh=null;}if(!fh){showToast('📂 初回のみファイルを選択してください',4000);[fh]=await window.showOpenFilePicker({startIn:'documents',types:[{description:'Markdown',accept:{'text/markdown':['.md'],'text/plain':['.md']}}]});await _putFH(src,fh);}document.getElementById('ed-title').textContent=title;document.getElementById('ed-area').value=await(await fh.getFile()).text();document.getElementById('ed-overlay').style.display='flex';document.getElementById('ed-save').onclick=async()=>{const w=await fh.createWritable();await w.write(document.getElementById('ed-area').value);await w.close();document.getElementById('ed-overlay').style.display='none';showToast('✅ 保存しました — 変換が開始されます',4000);if(Notification.permission==='granted')new Notification('MD-Web: 保存完了',{body:'自動変換・デプロイが開始されます',icon:'/icon-192.png'});};}catch(e){if(e.name!=='AbortError')showToast('ファイルを開けませんでした');}
    }
    var _API_URL=window.location.origin+'/mdweb-api';
    function openApiSettings(){document.getElementById('api-url-display').textContent=_API_URL;document.getElementById('api-token-input').value=localStorage.getItem('mdweb-api-token')||'';document.getElementById('api-overlay').style.display='flex';setTimeout(()=>document.getElementById('api-token-input').focus(),100);}
    async function saveApiSettings(){const token=document.getElementById('api-token-input').value.trim();const pingUrl=_API_URL+'/api/ping';if(!token){showToast('トークンを入力してください');return;}showToast('接続中... '+pingUrl,5000);try{const r=await fetch(pingUrl,{headers:{'Authorization':'Bearer '+token}});if(r.ok){localStorage.setItem('mdweb-api-token',token);document.getElementById('api-overlay').style.display='none';showToast('✅ API接続確認 — スマートフォンから編集できます',4000);}else showToast('⚠️ '+r.status+' — '+pingUrl,6000);}catch(e){showToast('⚠️ 接続エラー: '+e.message+' / '+pingUrl,8000);}}
    function clearApiSettings(){localStorage.removeItem('mdweb-api-token');document.getElementById('api-overlay').style.display='none';showToast('API設定を削除しました');}
    document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('ed-overlay').style.display='none';document.getElementById('api-overlay').style.display='none';}});
  </script>
  <button class="btn btn-ghost btn-circle fixed bottom-6 right-6 z-[100] shadow-lg" title="API設定（スマートフォン編集）" onclick="openApiSettings()">⚙️</button>
  <div id="api-overlay" class="fixed inset-0 z-[400] hidden items-center justify-center bg-neutral/60" style="display:none">
    <div class="modal-box max-w-md">
      <div class="mb-4 flex items-center justify-between gap-3"><h3 class="font-bold">API設定（スマートフォン用）</h3><button class="btn btn-sm btn-ghost" onclick="document.getElementById('api-overlay').style.display='none'">✕</button></div>
      <p class="text-sm leading-6 text-base-content/70">MacでAPIサーバーを起動すると、スマートフォンからもMDファイルを直接編集できます。</p>
      <div class="mt-4 rounded-lg border border-base-300 bg-base-200 p-3"><div class="text-xs text-base-content/50">接続先（自動設定）</div><code id="api-url-display" class="break-all text-xs"></code></div>
      <label class="form-control mt-4"><div class="label"><span class="label-text">API トークン</span></div><input id="api-token-input" type="password" class="input input-bordered font-mono" placeholder="setup-api.sh で表示されたトークン"></label>
      <div class="modal-action"><button onclick="clearApiSettings()" class="btn btn-outline btn-error">削除</button><button onclick="saveApiSettings()" class="btn btn-primary">接続テスト & 保存</button></div>
    </div>
  </div>
  <div id="ed-overlay" class="fixed inset-0 z-[400] hidden items-center justify-center bg-neutral/60" style="display:none">
    <div class="modal-box flex max-h-[90vh] max-w-3xl flex-col p-0">
      <div class="flex items-center justify-between gap-3 border-b border-base-300 px-5 py-4"><span id="ed-title" class="truncate font-bold"></span><button onclick="document.getElementById('ed-overlay').style.display='none'" class="btn btn-sm btn-ghost">✕</button></div>
      <textarea id="ed-area" class="textarea min-h-[360px] flex-1 resize-none rounded-none border-0 font-mono text-sm leading-7 focus:outline-none"></textarea>
      <div class="flex items-center justify-between gap-3 border-t border-base-300 px-5 py-4"><span class="text-xs text-base-content/50">保存するとウォッチャーが自動変換・デプロイします</span><div class="flex gap-2"><button onclick="document.getElementById('ed-overlay').style.display='none'" class="btn btn-ghost">閉じる</button><button id="ed-save" class="btn btn-primary">保存</button></div></div>
    </div>
  </div>
</body>
